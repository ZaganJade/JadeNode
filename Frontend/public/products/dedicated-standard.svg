<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <radialGradient id="bg-dedicated-standard.png" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0505"/>
    </radialGradient>
    <radialGradient id="glow-dedicated-standard.png" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ff4d4d" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-dedicated-standard.png">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <linearGradient id="accent-line-dedicated-standard.png" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff4d4d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="icon-fill-dedicated-standard.png" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff4d4d" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg-dedicated-standard.png)"/>
  
  <!-- Glow -->
  <rect width="600" height="600" fill="url(#glow-dedicated-standard.png)"/>

  <!-- Grid pattern (subtle) -->
  <g stroke="#ff4d4d" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="600"/>
    <line x1="50" y1="0" x2="50" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="250" y1="0" x2="250" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="350" y1="0" x2="350" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="550" y1="0" x2="550" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="450" x2="600" y2="450"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="550" x2="600" y2="550"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
  </g>

  <!-- Circuit lines -->
  
    <path d="M50,90 L50,200 L140,200 L140,130" fill="none" stroke="#ff4d4d" stroke-opacity="0.07" stroke-width="1"/>
    <path d="M550,90 L550,220 L460,220" fill="none" stroke="#ff4d4d" stroke-opacity="0.07" stroke-width="1"/>
    <path d="M80,520 L180,520 L180,440 L250,440" fill="none" stroke="#ff4d4d" stroke-opacity="0.05" stroke-width="1"/>
    <path d="M520,500 L420,500 L420,440" fill="none" stroke="#ff4d4d" stroke-opacity="0.05" stroke-width="1"/>
    <circle cx="140" cy="130" r="3" fill="#ff4d4d" opacity="0.1"/>
    <circle cx="460" cy="220" r="3" fill="#ff4d4d" opacity="0.1"/>
    <circle cx="250" cy="440" r="3" fill="#ff4d4d" opacity="0.06"/>
    <circle cx="420" cy="440" r="3" fill="#ff4d4d" opacity="0.06"/>
  

  <!-- Central icon -->
  <g transform="translate(300, 260)" fill="none" stroke="url(#icon-fill-dedicated-standard.png)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    
    <rect x="-40" y="-30" width="80" height="60" rx="4" stroke-width="2.5"/>
    <rect x="-34" y="-24" width="68" height="48" rx="2" stroke-width="0.8" opacity="0.3"/>
    <line x1="-28" y1="-14" x2="28" y2="-14" stroke-width="1" opacity="0.4"/>
    <line x1="-28" y1="-4" x2="28" y2="-4" stroke-width="1" opacity="0.4"/>
    <line x1="-28" y1="6" x2="20" y2="6" stroke-width="1" opacity="0.4"/>
    <line x1="-28" y1="16" x2="12" y2="16" stroke-width="1" opacity="0.4"/>
    <rect x="-40" y="-30" width="12" height="60" rx="0" stroke-width="0" fill="#ff4d4d" opacity="0.08"/>
    <circle cx="30" cy="22" r="3" stroke-width="1" opacity="0.6"/>
    <circle cx="30" cy="22" r="1" fill="#ff4d4d" opacity="0.4"/>
  
  </g>

  <!-- Glow behind icon -->
  <circle cx="300" cy="260" r="60" fill="#ff4d4d" opacity="0.06" filter="url(#blur-dedicated-standard.png)"/>

  <!-- Title -->
  <text x="300" y="420" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="white" opacity="0.95">Dedicated Standard</text>
  
  <!-- Subtitle -->
  <text x="300" y="450" text-anchor="middle" font-family="monospace" font-size="14" fill="#ff4d4d" opacity="0.7" letter-spacing="4">XEON · 32GB</text>

  <!-- Bottom accent line -->
  <line x1="200" y1="480" x2="400" y2="480" stroke="url(#accent-line-dedicated-standard.png)" stroke-width="1.5"/>

  <!-- Corner accents -->
  <polyline points="20,50 20,20 50,20" fill="none" stroke="#ff4d4d" stroke-opacity="0.3" stroke-width="1.5"/>
  <polyline points="550,20 580,20 580,50" fill="none" stroke="#ff4d4d" stroke-opacity="0.3" stroke-width="1.5"/>
  <polyline points="20,550 20,580 50,580" fill="none" stroke="#ff4d4d" stroke-opacity="0.3" stroke-width="1.5"/>
  <polyline points="550,580 580,580 580,550" fill="none" stroke="#ff4d4d" stroke-opacity="0.3" stroke-width="1.5"/>
</svg>